services:
  - type: web
    name: fastit
    runtime: python
    buildCommand: bash build.sh && pip install -r back/requirements.txt
    startCommand: cd back && bash startup.sh
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///./fastit.db
      - key: OPENAI_API_KEY
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
