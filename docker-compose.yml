services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       fastit
      POSTGRES_USER:     fastit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastit"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:         postgresql://fastit:${POSTGRES_PASSWORD}@db:5432/fastit
      SECRET_KEY:           ${SECRET_KEY}
      DEBUG:                "false"
      OPENAI_API_KEY:       ${OPENAI_API_KEY}
      SENDGRID_API_KEY:     ${SENDGRID_API_KEY}
      SENDGRID_FROM_EMAIL:  ${SENDGRID_FROM_EMAIL}
      ICECAT_USERNAME:      ${ICECAT_USERNAME:-}
      BACKEND_URL:          ${BACKEND_URL}
      FRONTEND_URL:         ${FRONTEND_URL}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-1234}
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./front/dist:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  pgdata:
  certbot_www:
  certbot_conf:
